<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sweetytory Payment</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Prompt', sans-serif;
    background: linear-gradient(135deg, #FFD542 0%, #B5BF5A 100%);
    min-height: 100vh;
    color: #755B3C;
}
/* อนิเมชั่นคงไว้ตามเดิม */
@keyframes float-up-down { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-15px) rotate(10deg); } }
@keyframes float-left-right { 0%, 100% { transform: translateX(0px) rotate(0deg); } 50% { transform: translateX(15px) rotate(-10deg); } }
@keyframes pulse-soft { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
@keyframes spin-slow { 100% { transform: rotate(360deg); } }
@keyframes dash-animation { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -24; } }
.animate-dash { animation: dash-animation 1s linear infinite; }
.anim-float-1 { animation: float-up-down 4s ease-in-out infinite; }
.anim-float-2 { animation: float-up-down 5s ease-in-out infinite 1.5s; }
.anim-float-3 { animation: float-left-right 6s ease-in-out infinite; }
.anim-float-4 { animation: float-left-right 4.5s ease-in-out infinite 2s; }
.anim-pulse { animation: pulse-soft 3s ease-in-out infinite; }
.anim-spin { animation: spin-slow 8s linear infinite; }

.glass-card {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 20px 50px -10px rgba(181, 191, 90, 0.3);
}
.virtual-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.virtual-card:hover { transform: translateY(-4px); }
::-webkit-scrollbar { width: 0px; }
</style>
<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                brand: { green: '#B5BF5A', yellow: '#FFD542', brown: '#755B3C' }
            }
        }
    }
}
</script>
</head>
<body class="flex flex-col items-center py-6 px-4 text-[#755B3C] relative overflow-x-hidden">

<!-- Background Decorative SVGs (สีปรับตามโทนใหม่) -->
<div class="fixed inset-0 pointer-events-none overflow-hidden z-0 opacity-40">
    <svg class="absolute top-[5%] left-[10%] w-8 h-8 text-[#FFD542] anim-float-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
    <svg class="absolute top-[50%] right-[2%] w-6 h-6 text-[#B5BF5A] anim-float-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
</div>

<!-- Toast Notification -->
<div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-[#755B3C]/95 text-white px-6 py-3 rounded-full shadow-xl transition-all duration-300 opacity-0 translate-y-4 z-50 flex items-center gap-2 font-medium text-sm">
    คัดลอกเลขบัญชีแล้ว
</div>

<!-- Container หลัก -->
<div class="max-w-[420px] w-full relative z-10 space-y-5 pb-10">
    <!-- Header -->
    <div class="text-center pt-2 pb-2">
        <h1 class="text-2xl font-bold text-[#755B3C] flex items-center justify-center gap-2">
            Sweety.tory
        </h1>
        <p class="text-sm font-medium text-[#755B3C]/70 mt-1">Payment & Checkout</p>
    </div>

    <!-- ดีไซน์การ์ดหลัก -->
    <div class="glass-card rounded-[40px] p-3 relative z-10">
        <div class="relative p-2 rounded-[36px]">
            <svg class="absolute inset-0 w-full h-full pointer-events-none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="2" width="calc(100% - 4px)" height="calc(100% - 4px)" rx="34" fill="none" stroke="#B5BF5A" stroke-width="2.5" stroke-dasharray="12 12" stroke-linecap="round" class="animate-dash" />
            </svg>
            <div class="rounded-[28px] overflow-hidden border-[4px] border-white">
                <img src="ไม่มีชื่อ 7148_20260629124354.png" alt="บัญชี sweetytory" class="w-full h-auto object-cover">
            </div>
        </div>

        <div class="p-4 pt-6 space-y-5">
            <div class="text-center space-y-3">
                <p class="text-[15px] font-medium text-[#755B3C]">
                    เลขบัญชีตามนี้เลยนะคะ <br>
                    ชื่อบัญชี <span class="text-[#B5BF5A] font-bold bg-[#FFD542]/20 px-2.5 py-0.5 rounded-lg border border-[#FFD542]">ธันยพัต</span> เท่านั้น!!
                </p>
            </div>

            <!-- ช่องทางการชำระเงิน -->
            <div class="space-y-4">
                <div class="virtual-card relative bg-[#B5BF5A] rounded-[24px] p-5 shadow-lg overflow-hidden cursor-pointer border border-white/30" onclick="copyText('216869758', this, 'kbank')">
                    <div class="relative z-10 flex justify-between items-center">
                        <span class="text-white font-bold text-sm tracking-wider bg-white/20 px-3 py-1 rounded-full">KBank</span>
                        <button class="kbank-btn bg-white text-[#755B3C] text-[12px] font-bold px-4 py-2 rounded-full">คัดลอก</button>
                    </div>
                    <div class="mt-3 text-white font-bold text-[22px] tracking-widest">216869758</div>
                </div>

                <div class="virtual-card relative bg-[#FFD542] rounded-[24px] p-5 shadow-lg overflow-hidden cursor-pointer border border-white/30" onclick="copyText('0943947154', this, 'true')">
                    <div class="relative z-10 flex justify-between items-center">
                        <span class="text-white font-bold text-sm tracking-wider bg-white/20 px-3 py-1 rounded-full">TrueMoney</span>
                        <button class="true-btn bg-white text-[#755B3C] text-[12px] font-bold px-4 py-2 rounded-full">คัดลอก</button>
                    </div>
                    <div class="mt-3 text-white font-bold text-[22px] tracking-widest">0943947154</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ช่องทางการติดต่อ -->
    <div class="glass-card rounded-[30px] p-6 text-center space-y-4">
        <h2 class="font-bold text-[#755B3C]">ช่องทางการติดต่อ</h2>
        <a href="https://lin.ee/7AJ4HpM" class="block w-full py-3 bg-[#B5BF5A] text-white font-bold rounded-full hover:bg-[#a3ad4d] transition-all">สั่งงาน / สอบถามทาง LINE 💭</a>
        <div class="flex justify-center gap-4 text-sm font-medium">
            <a href="https://m.facebook.com/sweety.tory.2024/?" class="text-[#755B3C] underline">Facebook</a>
            <a href="https://lin.ee/7AJ4HpM" class="text-[#755B3C] underline">Line Official</a>
        </div>
    </div>
</div>

<script>
function copyText(text, containerElement, type) {
    navigator.clipboard.writeText(text);
    showToast();
    const btn = containerElement.querySelector(type === 'kbank' ? '.kbank-btn' : '.true-btn');
    btn.innerHTML = 'สำเร็จ';
    setTimeout(() => { btn.innerHTML = 'คัดลอก'; }, 2000);
}
function showToast() {
    const toast = document.getElementById('toast');
    toast.classList.remove('opacity-0', 'translate-y-4');
    toast.classList.add('opacity-100', 'translate-y-0');
    setTimeout(() => { toast.classList.remove('opacity-100', 'translate-y-0'); toast.classList.add('opacity-0', 'translate-y-4'); }, 2500);
}
</script>
</body>
</html>
