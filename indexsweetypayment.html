<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sweetytory Payment</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
body {
font-family: 'Prompt', sans-serif;
background: linear-gradient(135deg, #fdfdf5 0%, #fffbf0 100%);
min-height: 100vh;
color: #755B3C;
}
/* อนิเมชั่นลอยๆ */
@keyframes float-up-down {
0%, 100% { transform: translateY(0px) rotate(0deg); }
50% { transform: translateY(-15px) rotate(10deg); }
}
@keyframes float-left-right {
0%, 100% { transform: translateX(0px) rotate(0deg); }
50% { transform: translateX(15px) rotate(-10deg); }
}
@keyframes pulse-soft {
0%, 100% { transform: scale(1); opacity: 0.8; }
50% { transform: scale(1.1); opacity: 1; }
}
@keyframes spin-slow { 100% { transform: rotate(360deg); } }
@keyframes dash-animation {
from { stroke-dashoffset: 0; }
to { stroke-dashoffset: -24; }
}
.animate-dash { animation: dash-animation 1s linear infinite; }
.anim-float-1 { animation: float-up-down 4s ease-in-out infinite; }
.anim-float-2 { animation: float-up-down 5s ease-in-out infinite 1.5s; }
.anim-float-3 { animation: float-left-right 6s ease-in-out infinite; }
.anim-float-4 { animation: float-left-right 4.5s ease-in-out infinite 2s; }
.anim-pulse { animation: pulse-soft 3s ease-in-out infinite; }
.anim-spin { animation: spin-slow 8s linear infinite; }

.glass-card {
background: rgba(255, 255, 255, 0.85);
backdrop-filter: blur(16px);
border: 1px solid rgba(255, 255, 255, 1);
box-shadow: 0 20px 50px -10px rgba(181, 191, 90, 0.2), inset 0 2px 10px rgba(255, 255, 255, 0.5);
}
.virtual-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.virtual-card:hover { transform: translateY(-4px); }
.btn-main { background: linear-gradient(135deg, #B5BF5A 0%, #FFD542 100%); color: white; display: block; padding: 10px; border-radius: 15px; text-align: center; font-weight: 600; margin-top: 10px; }
::-webkit-scrollbar { width: 0px; }
</style>
<script>
tailwind.config = {
theme: {
extend: {
colors: {
primary: '#B5BF5A',
secondary: '#FFD542',
brown: { 600: '#755B3C', 500: '#8b5e3c', 400: '#a38a71', 300: '#d4b49e', 200: '#e5dcd3' },
}
}
}
}
</script>
</head>
<body class="flex flex-col items-center py-6 px-4 relative overflow-x-hidden">
<!-- Background Decorative SVGs -->
<div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
<svg class="absolute top-[5%] left-[10%] w-8 h-8 text-primary/40 anim-float-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
<svg class="absolute top-[10%] right-[8%] w-10 h-10 text-secondary/40 anim-float-2" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-[#755B3C]/95 text-white px-6 py-3 rounded-full shadow-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50 flex items-center gap-2 font-medium text-sm">
คัดลอกเลขบัญชีแล้ว
</div>

<div class="max-w-[420px] w-full relative z-10 space-y-5 pb-10">
<!-- Header -->
<div class="text-center pt-2 pb-2">
<h1 class="text-2xl font-bold tracking-tight text-[#B5BF5A] flex items-center justify-center gap-2">
Sweety.tory
</h1>
<p class="text-sm font-medium text-[#755B3C]/70 mt-1">Payment & Checkout</p>
</div>

<!-- การ์ดหลัก -->
<div class="glass-card rounded-[40px] p-3 relative">
<div class="relative p-2 rounded-[36px]">
<svg class="absolute inset-0 w-full h-full pointer-events-none" xmlns="http://www.w3.org/2000/svg">
<rect x="2" y="2" width="calc(100% - 4px)" height="calc(100% - 4px)" rx="34" fill="none" stroke="#B5BF5A" stroke-width="2.5" stroke-dasharray="12 12" stroke-linecap="round" class="animate-dash" />
</svg>
<div class="rounded-[28px] overflow-hidden border-[4px] border-white">
<img src="https://placehold.co/600x600/B5BF5A/white?text=Account+Image" alt="account" class="w-full h-auto">
</div>
</div>

<div class="p-4 pt-6 space-y-5">
<div class="text-center">
<p class="text-[15px] font-medium text-[#755B3C]">ชื่อบัญชี <span class="text-[#B5BF5A] font-bold">ธันยพัต</span> เท่านั้น!!</p>
</div>

<!-- ช่องทางการชำระเงิน -->
<div class="space-y-4">
<div class="virtual-card bg-gradient-to-br from-[#B5BF5A] to-[#FFD542] rounded-[24px] p-5 shadow-lg text-white cursor-pointer" onclick="copyText('216869758', this, 'kbank')">
<div class="flex justify-between items-center mb-2">
<span class="font-bold">KBank</span>
<span class="kbank-btn text-[12px] bg-white/20 px-3 py-1 rounded-full">คัดลอก</span>
</div>
<div class="text-[22px] font-bold tracking-widest">216869758</div>
</div>

<div class="virtual-card bg-gradient-to-br from-[#FFD542] to-[#B5BF5A] rounded-[24px] p-5 shadow-lg text-white cursor-pointer" onclick="copyText('0943947154', this, 'true')">
<div class="flex justify-between items-center mb-2">
<span class="font-bold">TrueMoney</span>
<span class="true-btn text-[12px] bg-white/20 px-3 py-1 rounded-full">คัดลอก</span>
</div>
<div class="text-[22px] font-bold tracking-widest">0943947154</div>
</div>
</div>
</div>
</div>

<!-- Contact -->
<div class="glass-card rounded-[30px] p-5 text-center">
<h2 class="font-bold text-[#755B3C] mb-3">ช่องทางการติดต่อ</h2>
<a href="#" class="btn-main">Facebook</a>
<a href="#" class="btn-main">Line Official</a>
</div>
</div>

<script>
function copyText(text, containerElement, type) {
const textArea = document.createElement("textarea");
textArea.value = text;
document.body.appendChild(textArea);
textArea.select();
document.execCommand('copy');
document.body.removeChild(textArea);
showToast();
}
function showToast() {
const toast = document.getElementById('toast');
toast.classList.remove('opacity-0', 'translate-y-4');
toast.classList.add('opacity-100', 'translate-y-0');
setTimeout(() => {
toast.classList.remove('opacity-100', 'translate-y-0');
toast.classList.add('opacity-0', 'translate-y-4');
}, 2000);
}
</script>
</body>
</html>
